name: Build & Deploy Plank5

on:
  push:
    branches: [main]        # Trigger setiap push ke main
  pull_request:
    branches: [main]        # Juga run saat PR (tapi tidak deploy)

# Izin untuk GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya satu deployment berjalan dalam satu waktu
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Build ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Inject Firebase secrets dari GitHub Secrets
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_VAPID_KEY:                   ${{ secrets.VITE_VAPID_KEY }}
        run: npm run build

      - name: Upload artifact (untuk Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 2: Deploy ke GitHub Pages (hanya dari branch main) ─────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # Tidak deploy saat PR
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
