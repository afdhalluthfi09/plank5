<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Plank5</title>
    <script>
      // Ambil path setelah /plank5
      const segmentCount = 1 // jumlah segment base: 'plank5' = 1
      const l = window.location
      const path = l.pathname.split('/').slice(segmentCount + 1).join('/')
      const query = l.search
      const hash = l.hash

      // Redirect ke index dengan path disimpan di query param
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        '/' + l.pathname.split('/')[1] +   // pertahankan /plank5
        '/?p=/' + encodeURIComponent(path + query + hash)
      )
    </script>
  </head>
  <body></body>
</html>
