<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Simpan path asli, redirect ke root
      const path = window.location.pathname;
      const query = window.location.search;
      const hash = window.location.hash;
      const base = '/plank5';
      
      window.location.replace(
        base + '/?redirect=' + encodeURIComponent(path + query + hash)
      );
    </script>
  </head>
</html>
